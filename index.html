<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dreamscaper is an AI-powered image prompt generator that helps users create unique and detailed prompts for Midjourney/DALL-E.">
  <meta property="og:title" content="Dreamscaper">
  <meta property="og:description" content="Dreamscaper is an AI-powered image prompt generator that helps users create unique and detailed prompts for Midjourney/DALL-E.">
  <title>Dreamscaper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0b; color: #e4e4e7; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { max-width: 800px; width: 100%; padding: 24px; margin: 0 auto; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 8px; 
      background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #a1a1aa; font-size: 1.1rem; margin-bottom: 32px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 24px; margin-bottom: 16px; backdrop-filter: blur(10px); }
    button { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;
      border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; font-weight: 500; }
    button:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      color: #e4e4e7; padding: 12px 16px; border-radius: 8px; font-size: 1rem; width: 100%;
      outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: #3b82f6; }
    .footer { margin-top: auto; padding: 24px; text-align: center; color: #52525b; font-size: 0.85rem; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) { .container { padding: 16px; } h1 { font-size: 1.8rem; } }
  </style>
</head>
<body>
  <header>
    <h1>Dreamscaper</h1>
    <p class="subtitle">AI-powered image prompt generator</p>
  </header>
  <main class="container">
    <div class="card">
      <h2>Prompt Generation</h2>
      <textarea id="prompt-input" placeholder="Enter your prompt idea..."></textarea>
      <button id="generate-prompt-btn">Generate Prompt <span class="loading" id="loading-spinner" style="display: none;"></span></button>
      <div id="prompt-output" style="margin-top: 16px;"></div>
    </div>
    <div class="card">
      <h2>Image-based Prompt Generation</h2>
      <input id="image-input" type="text" placeholder="Enter image URL or description...">
      <button id="generate-image-prompt-btn">Generate Prompt <span class="loading" id="loading-spinner-image" style="display: none;"></span></button>
      <div id="image-prompt-output" style="margin-top: 16px;"></div>
    </div>
  </main>
  <footer class="footer">
    Built with ❤️ by AI App Factory
  </footer>
  <script>
    const generatePromptBtn = document.getElementById('generate-prompt-btn');
    const promptInput = document.getElementById('prompt-input');
    const promptOutput = document.getElementById('prompt-output');
    const loadingSpinner = document.getElementById('loading-spinner');

    const generateImagePromptBtn = document.getElementById('generate-image-prompt-btn');
    const imageInput = document.getElementById('image-input');
    const imagePromptOutput = document.getElementById('image-prompt-output');
    const loadingSpinnerImage = document.getElementById('loading-spinner-image');

    generatePromptBtn.addEventListener('click', async () => {
      const userInput = promptInput.value.trim();
      if (userInput === '') return;

      generatePromptBtn.disabled = true;
      loadingSpinner.style.display = 'inline-block';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: userInput })
        });
        const data = await response.json();
        const output = data.result;

        promptOutput.innerHTML = '';
        output.forEach((prompt) => {
          const card = document.createElement('div');
          card.classList.add('card');
          card.innerHTML = `<p>${prompt}</p>`;
          promptOutput.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        promptOutput.innerHTML = '<p>Error generating prompt. Please try again.</p>';
      } finally {
        generatePromptBtn.disabled = false;
        loadingSpinner.style.display = 'none';
      }
    });

    generateImagePromptBtn.addEventListener('click', async () => {
      const userInput = imageInput.value.trim();
      if (userInput === '') return;

      generateImagePromptBtn.disabled = true;
      loadingSpinnerImage.style.display = 'inline-block';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: userInput })
        });
        const data = await response.json();
        const output = data.result;

        imagePromptOutput.innerHTML = '';
        output.forEach((prompt) => {
          const card = document.createElement('div');
          card.classList.add('card');
          card.innerHTML = `<p>${prompt}</p>`;
          imagePromptOutput.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        imagePromptOutput.innerHTML = '<p>Error generating prompt. Please try again.</p>';
      } finally {
        generateImagePromptBtn.disabled = false;
        loadingSpinnerImage.style.display = 'none';
      }
    });
  </script>
</body>
</html>
